<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="160" fill="#0f0f23" rx="8"/>

  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b">
        <animate attributeName="stop-color" values="#ff6b6b;#ffd93d;#6bcb77;#4d96ff;#ff6b6b" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#4d96ff">
        <animate attributeName="stop-color" values="#4d96ff;#ff6b6b;#ffd93d;#6bcb77;#4d96ff" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd93d"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background particles -->
  <circle cx="50" cy="30" r="2" fill="#4d96ff" opacity="0.6">
    <animate attributeName="cy" values="30;140;30" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="50" r="1.5" fill="#ff6b6b" opacity="0.5">
    <animate attributeName="cy" values="50;140;50" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="20" r="2" fill="#6bcb77" opacity="0.4">
    <animate attributeName="cy" values="20;140;20" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="60" r="1.5" fill="#ffd93d" opacity="0.5">
    <animate attributeName="cy" values="60;140;60" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="40" r="1" fill="#4d96ff" opacity="0.3">
    <animate attributeName="cy" values="40;140;40" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Main text "jonad" letter by letter -->
  <g filter="url(#glow)">
    <!-- j -->
    <text x="68" y="85" fill="url(#g1)" font-family="monospace" font-size="48" font-weight="bold" text-anchor="middle">
      j
      <animate attributeName="y" values="60;85" dur="0.6s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" fill="freeze"/>
    </text>
    <!-- o -->
    <text x="130" y="85" fill="url(#g1)" font-family="monospace" font-size="48" font-weight="bold" text-anchor="middle" opacity="0">
      o
      <animate attributeName="y" values="60;85" dur="0.6s" begin="0.15s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.15s" fill="freeze"/>
    </text>
    <!-- n -->
    <text x="192" y="85" fill="url(#g1)" font-family="monospace" font-size="48" font-weight="bold" text-anchor="middle" opacity="0">
      n
      <animate attributeName="y" values="60;85" dur="0.6s" begin="0.3s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.3s" fill="freeze"/>
    </text>
    <!-- a -->
    <text x="254" y="85" fill="url(#g1)" font-family="monospace" font-size="48" font-weight="bold" text-anchor="middle" opacity="0">
      a
      <animate attributeName="y" values="60;85" dur="0.6s" begin="0.45s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.45s" fill="freeze"/>
    </text>
    <!-- d -->
    <text x="316" y="85" fill="url(#g1)" font-family="monospace" font-size="48" font-weight="bold" text-anchor="middle" opacity="0">
      d
      <animate attributeName="y" values="60;85" dur="0.6s" begin="0.6s" fill="freeze"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.6s" fill="freeze"/>
    </text>
  </g>

  <!-- Underline animated bar -->
  <rect x="60" y="100" width="0" height="3" rx="1.5" fill="url(#g2)">
    <animate attributeName="width" from="0" to="265" dur="0.8s" begin="0.8s" fill="freeze"/>
  </rect>

  <!-- Subtitle -->
  <text x="200" y="125" text-anchor="middle" fill="#8888aa" font-family="monospace" font-size="11" opacity="0" letter-spacing="3">
    build . ship . repeat
    <animate attributeName="opacity" from="0" to="0.7" dur="0.8s" begin="1.5s" fill="freeze"/>
  </text>

  <!-- Cursor blink -->
  <text x="330" y="82" fill="#4d96ff" font-family="monospace" font-size="36" font-weight="bold">
    _
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </text>

  <!-- Decorative bottom line -->
  <line x1="50" y1="140" x2="350" y2="140" stroke="#222244" stroke-width="1"/>
  <circle cx="50" cy="140" r="2" fill="#ff6b6b">
    <animate attributeName="cx" values="50;350" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
